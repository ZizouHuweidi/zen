modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - foot
        - swaylock
        - swayidle
        - slurp
        - grim
        - wlr-randr
        - wlsunset
        - brightnessctl
        - kanshi
        - polkit
        - pavucontrol
        - xfce-polkit
        - dunst
        - wl-mirror
        - wdisplays
        - cliphist
        - wl-clipboard
        - rofimoji
        - gammastep
        - thunar
        - kde-connect
        - network-manager-applet
        - bluez
        - bluez-tools
        - blueman
        - thunar-archive-plugin
        - thunar-volman
        - gammastep-indicator
        - tesseract
        - swappy

  - type: files
    files:
      - source: system/usr
        destination: /usr
      - source: system/etc
        destination: /etc
